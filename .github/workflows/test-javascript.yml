name: JavaScript Tests

on:
  push:
    branches: [ "main" ]
    # Executa apenas se arquivos JS ou configurações do NPM mudarem
    paths:
      - 'js/**'
      - '__tests__/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'js/**'
      - '__tests__/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch: # Adiciona um botão no GitHub para rodar manualmente se quiser

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão estável do Node
          cache: 'npm'       # Acelera as execuções futuras fazendo cache das dependências

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test